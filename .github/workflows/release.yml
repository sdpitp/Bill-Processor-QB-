name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to package (example: 1.0.0)"
        required: true
      sign:
        description: "Sign artifacts (requires RELEASE_CERT_BASE64 and RELEASE_CERT_PASSWORD secrets)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      runtime:
        description: "Runtime identifier"
        required: false
        default: "win-x64"
      selfContained:
        description: "Publish self-contained build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve release inputs
        id: resolve
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $runtime = if ([string]::IsNullOrWhiteSpace("${{ inputs.runtime }}")) { "win-x64" } else { "${{ inputs.runtime }}" }
            $selfContained = "${{ inputs.selfContained }}" -eq "true"
            $shouldSign = "${{ inputs.sign }}" -eq "true"
          } else {
            $rawTag = "${{ github.ref_name }}"
            $version = if ($rawTag.StartsWith("v")) { $rawTag.Substring(1) } else { $rawTag }
            $runtime = "win-x64"
            $selfContained = $false
            $shouldSign = $true
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "runtime=$runtime" >> $env:GITHUB_OUTPUT
          "self_contained=$($selfContained.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "should_sign=$($shouldSign.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: dotnet restore .\BillProcessorQb.slnx

      - name: Build
        shell: pwsh
        run: dotnet build .\BillProcessorQb.slnx --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet run --project .\tests\BillProcessor.Core.SelfTests\BillProcessor.Core.SelfTests.csproj

      - name: Validate signing secrets
        if: ${{ steps.resolve.outputs.should_sign == 'true' }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.RELEASE_CERT_BASE64 }}")) {
            throw "RELEASE_CERT_BASE64 secret is required when signing is enabled."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.RELEASE_CERT_PASSWORD }}")) {
            throw "RELEASE_CERT_PASSWORD secret is required when signing is enabled."
          }

      - name: Materialize signing certificate
        id: cert
        if: ${{ steps.resolve.outputs.should_sign == 'true' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "release-cert.pfx"
          $certBytes = [Convert]::FromBase64String("${{ secrets.RELEASE_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          "cert_path=$certPath" >> $env:GITHUB_OUTPUT

      - name: Package release (unsigned)
        if: ${{ steps.resolve.outputs.should_sign != 'true' }}
        shell: pwsh
        run: |
          $args = @(
            "-Version", "${{ steps.resolve.outputs.version }}",
            "-RuntimeIdentifier", "${{ steps.resolve.outputs.runtime }}",
            "-Configuration", "Release",
            "-OutputRoot", ".\artifacts\release"
          )

          if ("${{ steps.resolve.outputs.self_contained }}" -eq "true") {
            $args += "-SelfContained"
          }

          & .\scripts\release\Invoke-ReleasePackaging.ps1 @args

      - name: Package release (signed)
        if: ${{ steps.resolve.outputs.should_sign == 'true' }}
        shell: pwsh
        env:
          RELEASE_CERT_PASSWORD: ${{ secrets.RELEASE_CERT_PASSWORD }}
        run: |
          $args = @(
            "-Version", "${{ steps.resolve.outputs.version }}",
            "-RuntimeIdentifier", "${{ steps.resolve.outputs.runtime }}",
            "-Configuration", "Release",
            "-OutputRoot", ".\artifacts\release",
            "-Sign",
            "-CertificatePath", "${{ steps.cert.outputs.cert_path }}",
            "-CertificatePasswordEnvVar", "RELEASE_CERT_PASSWORD"
          )

          if ("${{ steps.resolve.outputs.self_contained }}" -eq "true") {
            $args += "-SelfContained"
          }

          & .\scripts\release\Invoke-ReleasePackaging.ps1 @args

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vendor-bill-processor-${{ steps.resolve.outputs.version }}
          path: artifacts/release/**
          if-no-files-found: error
